# ================================================================
# 本文件是声明式文档，供项目管理参考。
# 实际运行时的指令注册由 src/common/command_registry.py 控制。
#
# 字段说明：
#   slash: /指令触发词
#   text: 纯文字触发词（严格全文匹配）
#   min_tier: 最低群等级 (core / allied / public)
#   require_registered: 是否需要已登记
#   admin_only: 是否仅管理组可用
#   core_only: 是否馆内专属
# ================================================================

