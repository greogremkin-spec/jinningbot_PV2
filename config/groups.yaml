# ================================================================
# 晋宁会馆·秃贝五边形 v5.0 | 群分级配置
# ================================================================
#
# 说明：
# - core_groups   : 核心群（完整修行体系 / 核心语境）
# - allied_groups : 联盟群（可启用大部分游戏功能，并可配置独立世界观）
# - danger_groups : 危险群（仅保留极少数彩蛋功能）
# - 未列出的群   : 默认视为 public（公开群）
#
# 核心群子类型：
# - main  : 会馆主群
# - admin : 管理组官群
# - debug : 调试群（尽量不参与正式广播/统计）
#
# 设计约定：
# 1. world_event 的广播范围 = core + allied
# 2. public 群不进入游戏群集合
# 3. allied 群号必须与真实运行群号一致，否则会导致 tier 判断异常
# ================================================================

# ==================== Tier 0: 核心群 ====================
core_groups:
  564234162:
    name: "晋宁会馆主群"
    type: "main"

  210383914:
    name: "会馆管理组群"
    type: "admin"

  805930992:
    name: "功能调试群"
    type: "debug"

# ==================== Tier 1: 联盟群 ====================
allied_groups:
  1092658209:
    name: "妖灵会馆-顺湖会馆"
    world_setting: ""
    alias_map: {}

# ==================== 宣传配置 ====================
promotion:
  main_group_id: 564234162
  main_group_name: "晋宁会馆"
  slogan: "基于《罗小黑战记》的温馨同人社群"
  website: " "

# ==================== 跨群规则（预留） ====================
cross_group_rules:
  # 是否共享每日限次。
  # 当前 v5 默认 false：
  # - 独立群档 -> 各群独立计算
  # - 共享档(pointer) -> 因为底层数据是同一份，自然共享
  share_daily_limit: false

# ==================== Tier 3: 危险群 ====================
danger_groups:
  627896850:
    name: "超级无敌宇宙不知道得过什么奖的写作群"

  971353013:
    name: "Sam 酱的萝卜窝"