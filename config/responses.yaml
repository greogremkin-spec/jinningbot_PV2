# ==================== 1. 行政系统 ====================
admin:
  register_guide: "✨ 想要载入名录吗？请复制下面这段文字，填好后发给我哦 (嘿咻)~\n(为了隐私，建议私聊发送)"

  register_template: "/在馆人员登记(请直接复制填写发送)\nQQ号:\n馆内昵称:\n简称:\n妖名:\n简介:（可以包括性别年龄、六大系与御灵系技能、简述）"

  register_success: "✨ 登记成功！秃贝已经记住【{spirit_name}】的身世啦 (嘿咻)\n{bonus_msg}"

  bonus_msg: "💰 初始资金 {sp} 灵力已到账。"

  update_msg: "📝 资料已更新。"

  register_outer: "📋 登记成功！你已被记录为馆外成员~\n加入晋宁会馆主群可自动升级为馆内成员哦"


